name: Build Electron App

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 👇 Bun (optional, for consistency)
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      # 👇 Node REQUIRED for native builds
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (IMPORTANT → npm)
        run: npm install

      - name: Rebuild native modules
        run: npx electron-rebuild -f

      - name: Build Windows app
        run: npm run dist:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/**

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3 \
            libssl-dev \
            libx11-dev \
            libxkbfile-dev \
            libsecret-1-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (npm, not bun)
        run: npm install

      - name: Rebuild native modules
        run: npx electron-rebuild -f

      - name: Build Linux app
        run: npm run dist:linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/**